name: Deploy mitube.service to MonsterASP.NET

on:
  pull_request:
    branches:
      - master
    types:
      - closed
    paths:
      - 'Dash MPD Player/mitube.service/**'

jobs:
  build_and_deploy:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore "./Dash MPD Player/mitube.service/mitube.service.sln" --runtime win-x86

      - name: Build solution
        run: dotnet build "./Dash MPD Player/mitube.service/mitube.service.sln" --configuration Release --no-restore

      - name: Run tests
        run: dotnet test "./Dash MPD Player/mitube.service/mitube.service.sln" --configuration Release --no-build

      - name: Publish application
        run: dotnet publish "./Dash MPD Player/mitube.service/mitube.service.sln" --configuration Release --output ./publish --runtime win-x86 --no-build

      - name: Deploy to MonsterASP.NET via WebDeploy
        uses: rasmusbuchholdt/simply-web-deploy@2.1.0
        with:
          website-name: ${{ secrets.WEBSITE_NAME }}
          server-computer-name: ${{ secrets.SERVER_COMPUTER_NAME }}
          server-username: ${{ secrets.SERVER_USERNAME }}
          server-password: ${{ secrets.SERVER_PASSWORD }}
