<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif}
#video-player{width:100vw;height:100vh;object-fit:contain;background:#000}
video::-webkit-media-controls{display:none!important}
video::-webkit-media-controls-overlay-play-button{display:none!important}
video::-webkit-media-controls-start-playback-button{display:none!important}
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
#loading{color:#fff;font-size:16px;opacity:0;transition:opacity .3s;background:rgba(0,0,0,.7);padding:12px 24px;border-radius:8px}
#loading.active{opacity:1}
#error-display{position:absolute;bottom:0;left:0;right:0;background:rgba(220,30,30,.9);color:#fff;padding:12px 16px;font-size:13px;display:none;z-index:10}
#error-display.show{display:block}
#controls{position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(transparent,rgba(0,0,0,.8));display:flex;align-items:center;padding:0 16px;opacity:0;transition:opacity .3s;z-index:5}
#controls .left{display:flex;align-items:center;gap:8px}
#controls .right{margin-left:auto;display:flex;align-items:center}
#channel-name{position:absolute;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40%;text-align:center}
#controls.show{opacity:1}
#controls.visible{opacity:1}
#controls:hover{opacity:1}
#controls button{background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;margin-right:8px;display:flex;align-items:center;justify-content:center}
#btn-fullscreen{font-size:16px}
#controls button:hover{background:rgba(255,255,255,.4)}
/* Settings overlay — Netflix style */
#settings-panel{position:absolute;right:16px;top:50%;transform:translateY(-50%);background:rgba(28,28,28,.93);border:1px solid #444;border-radius:10px;padding:16px 20px;min-width:260px;z-index:20;display:none;pointer-events:auto}
#settings-panel.open{display:block}
.st-title{color:#fff;font-weight:700;font-size:15px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid rgba(255,255,255,.1)}
.st-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;cursor:pointer;border-radius:4px;transition:background .15s}
.st-row.focused{background:rgba(0,90,158,.35)}
.st-label{color:#999;font-size:13px;flex-shrink:0}
.st-value{color:#fff;font-size:14px;text-align:right}
/* Option picker inline */
.st-picker{display:none;flex-wrap:wrap;gap:4px;padding:4px 0}
.st-picker.open{display:flex}
.st-opt{padding:4px 10px;border-radius:4px;border:1px solid #555;color:#ccc;font-size:12px;cursor:pointer;background:transparent;transition:all .15s}
.st-opt.selected{background:var(--accent,#005a9e);border-color:var(--accent,#005a9e);color:#fff}
.st-opt.focused{border-color:var(--accent,#005a9e);box-shadow:0 0 6px rgba(0,90,158,.5)}
</style>
</head>
<body>
<video id="video-player" autoplay muted poster="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"></video>
<div id="overlay"><div id="loading">Cargando canal...</div></div>
<div id="error-display"></div>
<div id="controls">
  <div class="left">
    <button id="btn-play" onclick="togglePlay()">&#10074;&#10074;</button>
    <button id="btn-mute" onclick="toggleMute()">&#128263;</button>
  </div>
  <span id="channel-name"></span>
  <div class="right">
    <button id="btn-settings" onclick="toggleSettings()">&#9881;</button>
    <button id="btn-fullscreen" onclick="toggleFullscreen()">&#9974;</button>
  </div>
</div>
<div id="settings-panel">
  <div class="st-title">&#9881; Settings</div>
  <div class="st-row" data-cat="quality">
    <span class="st-label">Calidad</span>
    <span class="st-value" id="st-quality-val">Auto</span>
  </div>
  <div class="st-picker" id="st-quality-picker"></div>
  <div class="st-row" data-cat="audio">
    <span class="st-label">Audio</span>
    <span class="st-value" id="st-audio-val">-</span>
  </div>
  <div class="st-picker" id="st-audio-picker"></div>
  <div class="st-row" data-cat="subtitle">
    <span class="st-label">Subtítulos</span>
    <span class="st-value" id="st-subtitle-val">Off</span>
  </div>
  <div class="st-picker" id="st-subtitle-picker"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4/dist/shaka-player.compiled.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
let player = null;
let hls = null;
let currentChannel = null;
let controlsVisible = false;
let controlsTimer = null;
let loadTimeout = null;
let diagInterval = null;

// Settings state
let settingsOpen = false;
let settingsFocusRow = 0; // 0=quality, 1=audio, 2=subtitle
let qualityIdx = 0;
let audioIdx = 0;
let subtitleIdx = 0;
let qualityOpts = [{label:'Auto',value:'auto'}];
let audioOpts = [];
let subtitleOpts = [{label:'Off',value:null}];

function postToAndroid(msg) {
  try {
    if (window.Android && window.Android.postMessage) {
      window.Android.postMessage(JSON.stringify(msg));
    }
  } catch(e) {}
}

function init() {
  shaka.polyfill.installAll();
  console.log('Shaka polyfill installed');

  var mseSupport = typeof MediaSource !== 'undefined' || typeof WebKitMediaSource !== 'undefined';
  var emeSupport = typeof navigator.requestMediaKeySystemAccess !== 'undefined';
  console.log('MSE support: ' + mseSupport + ', EME support: ' + emeSupport);

  if (!shaka.Player.isBrowserSupported()) {
    console.error('Shaka browser not supported');
    showError('Este navegador no soporta Shaka Player');
    return;
  }
  console.log('Shaka browser supported');

  var video = document.getElementById('video-player');
  player = new shaka.Player(video);
  console.log('Shaka Player created');
  player.addEventListener('error', onPlayerError);
  player.getNetworkingEngine().registerRequestFilter(onRequestFilter);
  player.getNetworkingEngine().registerResponseFilter(function(type, response) {
    if (type !== shaka.net.NetworkingEngine.RequestType.LICENSE) {
      var size = response.data ? response.data.byteLength : 0;
      var ct = response.headers['content-type'] || '?';
      console.log('Response: type=' + type + ', uri=' + (response.uri || '?') + ', size=' + size + ', ct=' + ct);
    }
    if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST && response.data) {
      var text = new TextDecoder().decode(response.data);
      console.log('Manifest content (' + text.length + ' chars): ' + text.substring(0, 400).replace(/\n/g, '\\n'));
    }
  });
  video.addEventListener('click', function() { if (settingsOpen) hideSettings(); toggleControls(); });
  // Subscribe to track changes (live DASH)
  player.addEventListener('trackschanged', function() { refreshTrackOptions(); });
  showControls();
  document.getElementById('loading').classList.remove('active');
  document.title = 'IPTV Player';
  postToAndroid({ action: 'init', mse: mseSupport, eme: emeSupport });
  // Key handler for D-pad navigation in settings
  document.addEventListener('keydown', onKeyDown);
}

function onKeyDown(e) {
  if (!settingsOpen) return;
  var rows = document.querySelectorAll('.st-row');
  var cat = rows[settingsFocusRow]?.getAttribute('data-cat');
  switch (e.key) {
    case 'ArrowUp':
    case 'ArrowDown':
      e.preventDefault();
      rows.forEach(function(r) { r.classList.remove('focused'); });
      settingsFocusRow = (settingsFocusRow + (e.key === 'ArrowUp' ? -1 : 1) + rows.length) % rows.length;
      rows[settingsFocusRow]?.classList.add('focused');
      break;
    case 'ArrowLeft':
      e.preventDefault();
      cycleOption(cat, -1);
      break;
    case 'ArrowRight':
    case 'Enter':
      e.preventDefault();
      cycleOption(cat, 1);
      break;
    case 'Backspace':
    case 'Escape':
      e.preventDefault();
      hideSettings();
      break;
  }
}

function onRequestFilter(type, request) {
  const uri = request.uris[0];

  if (currentChannel?.headers && type !== shaka.net.NetworkingEngine.RequestType.MANIFEST) {
    for (const [key, value] of Object.entries(currentChannel.headers)) {
      request.headers[key] = value;
    }
  }

  if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
    if (uri === currentChannel?.url) {
      request.uris[0] = currentChannel?.manifestUrl || uri;
    }
    return;
  }

  if (type === shaka.net.NetworkingEngine.RequestType.LICENSE) {
    const licenseUrl = currentChannel?.drmLicenseUri || uri;
    request.uris[0] = currentChannel?.licenseProxyUrl || licenseUrl;
    return;
  }
}

function destroyHls() {
  if (hls) {
    hls.destroy();
    hls = null;
  }
}

// ───────── Settings ─────────

function refreshTrackOptions() {
  if (!player) return;
  try {
    const variants = player.getVariantTracks() || [];
    const heights = [...new Set(variants.map(t => t.height || 0))].filter(h => h > 0).sort((a,b) => b - a);
    qualityOpts = [{label:'Auto',value:'auto'}].concat(heights.map(h => ({label:h+'p',value:h})));
    qualityIdx = Math.min(qualityIdx, qualityOpts.length - 1);
  } catch(e) { console.warn('refresh quality:', e); }

  try {
    const audioTracks = player.getAudioTracks() || [];
    audioOpts = audioTracks.map(t => ({label: t.label || t.language || 'Track '+t.id, value: t}));
    audioIdx = Math.min(audioIdx, Math.max(0, audioOpts.length - 1));
  } catch(e) { console.warn('refresh audio:', e); }

  try {
    const textTracks = player.getTextTracks() || [];
    subtitleOpts = [{label:'Off',value:null}].concat(textTracks.map(t => ({label: t.label || t.language || 'Track '+t.id, value: t})));
    subtitleIdx = Math.min(subtitleIdx, subtitleOpts.length - 1);
  } catch(e) { console.warn('refresh subtitle:', e); }

  updateSettingsDisplay();
}

function updateSettingsDisplay() {
  document.getElementById('st-quality-val').textContent = qualityOpts[qualityIdx]?.label || 'Auto';
  document.getElementById('st-audio-val').textContent = audioOpts[audioIdx]?.label || '-';
  document.getElementById('st-subtitle-val').textContent = subtitleOpts[subtitleIdx]?.label || 'Off';
}

function toggleSettings() {
  if (settingsOpen) { hideSettings(); } else { showSettings(); }
}

function showSettings() {
  settingsOpen = true;
  settingsFocusRow = 0;
  refreshTrackOptions();
  document.getElementById('settings-panel').classList.add('open');
  document.getElementById('controls').classList.add('show');
  clearTimeout(controlsTimer);
  // Focus first row
  var rows = document.querySelectorAll('.st-row');
  rows.forEach(function(r) { r.classList.remove('focused'); });
  rows[0]?.classList.add('focused');
}

function hideSettings() {
  settingsOpen = false;
  document.getElementById('settings-panel').classList.remove('open');
  var rows = document.querySelectorAll('.st-row');
  rows.forEach(function(r) { r.classList.remove('focused'); });
  setTimeout(function() { if (!controlsVisible) hideControls(); }, 100);
}

function cycleOption(cat, dir) {
  if (cat === 'quality') {
    qualityIdx = (qualityIdx + dir + qualityOpts.length) % qualityOpts.length;
    updateSettingsDisplay();
    var opt = qualityOpts[qualityIdx];
    if (opt.value === 'auto') { player.configure({ abr: { enabled: true } }); }
    else {
      player.configure({ abr: { enabled: false } });
      var track = (player.getVariantTracks() || []).find(function(t) { return t.height === opt.value; });
      if (track) player.selectVariantTrack(track, true);
    }
  } else if (cat === 'audio') {
    if (audioOpts.length === 0) return;
    audioIdx = (audioIdx + dir + audioOpts.length) % audioOpts.length;
    updateSettingsDisplay();
    var opt = audioOpts[audioIdx];
    if (opt.value) player.selectAudioTrack(opt.value, true);
  } else if (cat === 'subtitle') {
    subtitleIdx = (subtitleIdx + dir + subtitleOpts.length) % subtitleOpts.length;
    updateSettingsDisplay();
    var opt = subtitleOpts[subtitleIdx];
    if (opt.value) { player.selectTextTrack(opt.value); player.setTextTrackVisibility(true); }
    else { player.setTextTrackVisibility(false); }
  }
}

function applyDefaults() {
  if (!player) return;
  try {
    var audioTracks = player.getAudioTracks() || [];
    if (audioTracks.length > 1) {
      var spanish = audioTracks.find(function(t) {
        var id = String(t.id).toLowerCase();
        var label = (t.label || '').toLowerCase();
        return id.includes('spa') || label.includes('spa') || id.includes('español') || label.includes('español') || id.includes('spanish') || label.includes('spanish');
      });
      if (spanish) { player.selectAudioTrack(spanish); }
    }
  } catch(e) { console.warn('applyDefaults audio:', e); }
  try { player.setTextTrackVisibility(false); } catch(e) {}
  refreshTrackOptions();
}

// ───────── Playback ─────────

function loadChannel(channel) {
  if (diagInterval) { clearInterval(diagInterval); diagInterval = null; }
  if (loadTimeout) clearTimeout(loadTimeout);
  hideSettings();
  destroyHls();
  currentChannel = channel;
  document.getElementById('channel-name').textContent = channel.name || '';
  document.title = channel.name || 'IPTV Player';
  showLoading(true);
  var video = document.getElementById('video-player');

  if (channel.type === 'HLS') {
    video.src = '';
    console.log('HLS loading: ' + channel.url);

    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      hls = new Hls({ enableWorker: false });
      hls.loadSource(channel.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        console.log('HLS manifest parsed');
        showLoading(false);
        video.play().then(function() {
          console.log('HLS playing');
          postToAndroid({ action: 'loaded', name: channel.name });
          diagInterval = setInterval(function() {
            var buf = video.buffered;
            var bufLen = buf.length;
            var bufEnd = bufLen > 0 ? buf.end(bufLen - 1) : 0;
            console.log('DIAG: readyState=' + video.readyState + ', paused=' + video.paused + ', currentTime=' + video.currentTime.toFixed(1) + ', bufEnd=' + bufEnd.toFixed(1));
          }, 3000);
        }).catch(function(e) {
          console.error('HLS play error:', e);
          showError('Error al reproducir HLS');
        });
      });
      hls.on(Hls.Events.ERROR, function(event, data) {
        console.error('HLS error:', data.type, data.details, data.fatal);
        if (data.fatal) {
          showError('Error HLS: ' + (data.type || 'desconocido'));
          postToAndroid({ action: 'error', message: 'HLS fatal: ' + data.type + ' ' + data.details });
        }
      });
    } else {
      showError('HLS no soportado en este navegador');
    }
    return;
  }

  if (channel.type === 'CLEARKEY' && channel.keyId && channel.key) {
    const keyId = channel.keyId.replace(/-/g, '');
    const key = channel.key.replace(/-/g, '');
    player.configure({
      drm: {
        clearKeys: {
          [keyId]: key
        }
      }
    });
  }

  if (channel.type === 'WIDEVINE' && channel.drmLicenseUri) {
    player.configure({
      drm: {
        servers: {
          'com.widevine.alpha': channel.drmLicenseUri
        }
      }
    });
  }

  loadTimeout = setTimeout(function() {
    console.error('player.load TIMEOUT after 15s');
    showLoading(false);
    showError('Timeout: el MPD no se pudo cargar en 15s');
    postToAndroid({ action: 'timeout', url: channel.url });
  }, 15000);

  console.log('player.load called, url: ' + (channel.url || channel.manifestUrl));
  player.load(channel.manifestUrl || channel.url).then(function() {
    console.log('player.load resolved');
    if (loadTimeout) clearTimeout(loadTimeout);
    showLoading(false);
    document.getElementById('btn-play').innerHTML = '&#10074;&#10074;';
    if (video.muted) {
      video.muted = false;
      document.getElementById('btn-mute').innerHTML = '&#128266;';
    }
    postToAndroid({ action: 'loaded', name: channel.name });
    if (diagInterval) clearInterval(diagInterval);
    diagInterval = setInterval(function() {
      var stats = player ? player.getStats() : null;
      var buf = video.buffered;
      var bufLen = buf.length;
      var bufEnd = bufLen > 0 ? buf.end(bufLen - 1) : 0;
      console.log('DIAG: readyState=' + video.readyState + ', paused=' + video.paused + ', currentTime=' + video.currentTime.toFixed(1) + ', bufEnd=' + bufEnd.toFixed(1) + ', bufLen=' + bufLen + ', dropped=' + (stats ? stats.droppedFrames : '?') + ', stalled=' + (stats ? stats.stallDetected : '?'));
    }, 3000);
    applyDefaults();
  }).catch(function(err) {
    if (diagInterval) { clearInterval(diagInterval); diagInterval = null; }
    console.error('player.load error:', err);
    if (loadTimeout) clearTimeout(loadTimeout);
    showLoading(false);
    var loadMsg = err.code === 6007
      ? 'Servidor de licencias no accesible. El canal no puede reproducirse.'
      : 'Error al cargar: ' + (err.message || err);
    showError(loadMsg);
    postToAndroid({ action: 'loadError', message: err.message, code: err.code });
  });
}

function togglePlay() {
  const video = document.getElementById('video-player');
  if (video.paused) {
    video.play();
    document.getElementById('btn-play').innerHTML = '&#10074;&#10074;';
  } else {
    video.pause();
    document.getElementById('btn-play').innerHTML = '&#9654;';
  }
}

function toggleMute() {
  const video = document.getElementById('video-player');
  video.muted = !video.muted;
  document.getElementById('btn-mute').innerHTML = video.muted ? '&#128263;' : '&#128266;';
}

function toggleControls() {
  controlsVisible = !controlsVisible;
  document.getElementById('controls').classList.toggle('visible', controlsVisible);
  if (controlsVisible) {
    clearTimeout(controlsTimer);
    controlsTimer = setTimeout(() => {
      controlsVisible = false;
      document.getElementById('controls').classList.remove('visible');
    }, 5000);
  }
}

function showControls() {
  document.getElementById('controls').classList.add('show');
  clearTimeout(controlsTimer);
  controlsTimer = setTimeout(() => {
    if (!controlsVisible) document.getElementById('controls').classList.remove('show');
  }, 3000);
}

function hideControls() {
  if (!controlsVisible && !settingsOpen) document.getElementById('controls').classList.remove('show');
}

function toggleFullscreen() {
  var el = document.getElementById('video-player');
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    if (el.requestFullscreen) { el.requestFullscreen(); }
    else if (el.webkitRequestFullscreen) { el.webkitRequestFullscreen(); }
  } else {
    if (document.exitFullscreen) { document.exitFullscreen(); }
    else if (document.webkitExitFullscreen) { document.webkitExitFullscreen(); }
  }
}

document.addEventListener('fullscreenchange', function() {
  document.getElementById('btn-fullscreen').innerHTML = document.fullscreenElement ? '&#10530;' : '&#9974;';
});
document.addEventListener('webkitfullscreenchange', function() {
  document.getElementById('btn-fullscreen').innerHTML = document.webkitFullscreenElement ? '&#10530;' : '&#9974;';
});

function showLoading(active) {
  document.getElementById('loading').classList.toggle('active', active);
}

function showError(msg) {
  const el = document.getElementById('error-display');
  el.textContent = typeof msg === 'string' ? msg : (msg.detail?.message || 'Error desconocido');
  el.classList.add('show');
  setTimeout(function() { el.classList.remove('show'); }, 8000);
}

function onPlayerError(event) {
  const err = event.detail;
  var dataStr = '';
  if (err.data && err.data.length > 0) {
    dataStr = err.data.map(function(d) { return typeof d === 'string' ? d : JSON.stringify(d); }).join(', ');
  }
  console.error('Shaka error: code=' + err.code + ', cat=' + err.category + ', sev=' + err.severity + ', data=[' + dataStr + ']');
  var msg = 'Error: [' + err.code + '] ' + (err.message || 'desconocido');
  if (err.code === 6007) {
    msg = 'Servidor de licencias no accesible. El canal no puede reproducirse.';
  } else if (err.severity === 2) {
    msg = 'Error recuperable [' + err.code + ']: ' + (err.data ? dataStr : err.message);
  }
  showError(msg);
  postToAndroid({ action: 'error', code: err.code, category: err.category, data: dataStr, message: err.message });
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
