<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',sans-serif}
#video-player{width:100vw;height:100vh;object-fit:contain;background:#000}
#overlay{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
#loading{color:#fff;font-size:16px;opacity:0;transition:opacity .3s;background:rgba(0,0,0,.7);padding:12px 24px;border-radius:8px}
#loading.active{opacity:1}
#error-display{position:absolute;bottom:0;left:0;right:0;background:rgba(220,30,30,.9);color:#fff;padding:12px 16px;font-size:13px;display:none;z-index:10}
#error-display.show{display:block}
#controls{position:absolute;bottom:0;left:0;right:0;height:48px;background:linear-gradient(transparent,rgba(0,0,0,.8));display:flex;align-items:center;padding:0 16px;opacity:0;transition:opacity .3s;z-index:5}
#controls .left{display:flex;align-items:center;gap:8px}
#controls .right{margin-left:auto;display:flex;align-items:center}
#channel-name{position:absolute;left:50%;transform:translateX(-50%);color:#fff;font-size:13px;opacity:.8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:40%;text-align:center}
#controls.show{opacity:1}
#controls.visible{opacity:1}
#controls:hover{opacity:1}
#controls button{background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:18px;margin-right:8px;display:flex;align-items:center;justify-content:center}
#btn-fullscreen{font-size:16px}
#controls button:hover{background:rgba(255,255,255,.4)}
#btn-settings{font-size:18px;line-height:1;background:none!important;width:auto;padding:0 8px}
#btn-settings.active{background:rgba(255,255,255,.3)!important;border-radius:4px}
#settings-panel{position:absolute;bottom:56px;right:16px;background:rgba(28,28,28,.95);border-radius:8px;padding:16px;min-width:260px;z-index:20;display:none;font-family:'Segoe UI',sans-serif;color:#fff}
#settings-panel.visible{display:block}
#settings-panel h3{margin:0 0 8px;font-size:14px;font-weight:600;opacity:.9}
.sp-row{padding:8px 12px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;border-radius:4px;margin-bottom:2px}
.sp-row:hover{background:rgba(255,255,255,.08)}
.sp-label{font-size:13px;opacity:.7}
.sp-value{font-size:13px;text-align:right;display:flex;align-items:center;gap:4px}
.sp-arrow{font-size:10px;opacity:.5}
.sp-picker{display:none;padding:4px 12px 8px;flex-wrap:wrap;gap:4px}
.sp-picker.open{display:flex}
.sp-option{padding:4px 10px;border-radius:4px;font-size:12px;cursor:pointer;background:rgba(255,255,255,.08);transition:background .15s}
.sp-option:hover{background:rgba(255,255,255,.2)}
.sp-option.selected{background:var(--accent,#005a9e);font-weight:600}

</style>
</head>
<body>
<video id="video-player" autoplay muted></video>
<div id="overlay"><div id="loading">Cargando canal...</div></div>
<div id="error-display"></div>
<div id="controls">
  <div class="left">
    <button id="btn-play" onclick="togglePlay()">&#10074;&#10074;</button>
    <button id="btn-mute" onclick="toggleMute()">&#128263;</button>
  </div>
  <span id="channel-name"></span>
  <div class="right">
    <button id="btn-settings" onclick="toggleSettings()">&#9881;</button>
    <button id="btn-fullscreen" onclick="toggleFullscreen()">&#9974;</button>
  </div>
</div>

<div id="settings-panel">
  <h3>Ajustes</h3>
  <div class="sp-row" onclick="onSettingsRowClick('quality')">
    <span class="sp-label">Calidad</span>
    <span class="sp-value"><span id="sp-quality-value">Auto</span><span class="sp-arrow">&#9654;</span></span>
  </div>
  <div class="sp-picker" id="sp-picker-quality"></div>
  <div class="sp-row" onclick="onSettingsRowClick('audio')">
    <span class="sp-label">Audio</span>
    <span class="sp-value"><span id="sp-audio-value">Auto</span><span class="sp-arrow">&#9654;</span></span>
  </div>
  <div class="sp-picker" id="sp-picker-audio"></div>
  <div class="sp-row" onclick="onSettingsRowClick('subtitle')">
    <span class="sp-label">Subt&iacute;tulos</span>
    <span class="sp-value"><span id="sp-subtitle-value">Off</span><span class="sp-arrow">&#9654;</span></span>
  </div>
  <div class="sp-picker" id="sp-picker-subtitle"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/shaka-player@4/dist/shaka-player.compiled.js"></script>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
let player = null;
let hls = null;
let currentChannel = null;
let controlsVisible = false;
let controlsTimer = null;

let loadTimeout = null;
let diagInterval = null;

function init() {
  shaka.polyfill.installAll();
  console.log('Shaka polyfill installed');

  var mseSupport = typeof MediaSource !== 'undefined' || typeof WebKitMediaSource !== 'undefined';
  var emeSupport = typeof navigator.requestMediaKeySystemAccess !== 'undefined';
  console.log('MSE support: ' + mseSupport + ', EME support: ' + emeSupport);

  if (!shaka.Player.isBrowserSupported()) {
    var reason = shaka.Player.isBrowserSupported.name;
    console.error('Shaka browser not supported');
    showError('Este navegador no soporta Shaka Player');
    return;
  }
  console.log('Shaka browser supported');

  var video = document.getElementById('video-player');
  player = new shaka.Player(video);
  console.log('Shaka Player created');
  player.addEventListener('error', onPlayerError);
  player.addEventListener('trackschanged', function() {
    if (settingsVisible) refreshTrackOptions();
  });
  player.getNetworkingEngine().registerRequestFilter(onRequestFilter);
  player.getNetworkingEngine().registerResponseFilter(function(type, response) {
    if (type !== shaka.net.NetworkingEngine.RequestType.LICENSE) {
      var size = response.data ? response.data.byteLength : 0;
      var ct = response.headers['content-type'] || '?';
      console.log('Response: type=' + type + ', uri=' + (response.uri || '?') + ', size=' + size + ', ct=' + ct);
    }
    if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST && response.data) {
      var text = new TextDecoder().decode(response.data);
      console.log('Manifest content (' + text.length + ' chars): ' + text.substring(0, 400).replace(/\n/g, '\\n'));
    }
  });
  video.addEventListener('click', toggleControls);
  video.addEventListener('mouseenter', showControls);
  video.addEventListener('mousemove', showControls);
  video.addEventListener('mouseleave', function() { if (!controlsVisible) hideControls(); });
  showControls();
  document.getElementById('loading').classList.remove('active');
  document.title = 'IPTV Player';

  try {
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.postMessage(JSON.stringify({ action: 'init', mse: mseSupport, eme: emeSupport }));
    }
  } catch(e) {}
}

function onRequestFilter(type, request) {
  const uri = request.uris[0];

  if (currentChannel?.headers && type !== shaka.net.NetworkingEngine.RequestType.MANIFEST) {
    for (const [key, value] of Object.entries(currentChannel.headers)) {
      request.headers[key] = value;
    }
  }

  if (type === shaka.net.NetworkingEngine.RequestType.MANIFEST) {
    if (uri === currentChannel?.url) {
      request.uris[0] = currentChannel?.manifestUrl || uri;
    }
    return;
  }

  if (type === shaka.net.NetworkingEngine.RequestType.LICENSE) {
    const licenseUrl = currentChannel?.drmLicenseUri || uri;
    request.uris[0] = currentChannel?.licenseProxyUrl || licenseUrl;
    return;
  }
}

function destroyHls() {
  if (hls) {
    hls.destroy();
    hls = null;
  }
}

function loadChannel(channel) {
  if (diagInterval) { clearInterval(diagInterval); diagInterval = null; }
  if (loadTimeout) clearTimeout(loadTimeout);
  destroyHls();
  currentChannel = channel;
  document.getElementById('channel-name').textContent = channel.name || '';
  document.title = channel.name || 'IPTV Player';
  // Close settings and reset selections on channel change
  if (settingsVisible) {
    settingsVisible = false;
    document.getElementById('settings-panel').classList.remove('visible');
    document.getElementById('btn-settings').classList.remove('active');
    pickerCategory = null;
    renderPicker(null);
  }
  selectedTracks = { quality: -1, audio: -1, subtitle: -1 };
  showLoading(true);
  var video = document.getElementById('video-player');

  if (channel.type === 'HLS') {
    video.src = '';
    console.log('HLS loading: ' + channel.url);

    if (typeof Hls !== 'undefined' && Hls.isSupported()) {
      hls = new Hls({ enableWorker: false });
      hls.loadSource(channel.url);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, function() {
        console.log('HLS manifest parsed');
        showLoading(false);
        video.play().then(function() {
          console.log('HLS playing');
          try {
            if (window.chrome && window.chrome.webview) {
              window.chrome.webview.postMessage(JSON.stringify({ action: 'loaded', name: channel.name }));
            }
          } catch(e) {}
          diagInterval = setInterval(function() {
            var buf = video.buffered;
            var bufLen = buf.length;
            var bufEnd = bufLen > 0 ? buf.end(bufLen - 1) : 0;
            console.log('DIAG: readyState=' + video.readyState + ', paused=' + video.paused + ', currentTime=' + video.currentTime.toFixed(1) + ', bufEnd=' + bufEnd.toFixed(1));
          }, 3000);
        }).catch(function(e) {
          console.error('HLS play error:', e);
          showError('Error al reproducir HLS');
        });
      });
      hls.on(Hls.Events.ERROR, function(event, data) {
        console.error('HLS error:', data.type, data.details, data.fatal);
        if (data.fatal) {
          showError('Error HLS: ' + (data.type || 'desconocido'));
          try {
            if (window.chrome && window.chrome.webview) {
              window.chrome.webview.postMessage(JSON.stringify({ action: 'error', message: 'HLS fatal: ' + data.type + ' ' + data.details }));
            }
          } catch(e) {}
        }
      });
    } else {
      showError('HLS no soportado en este navegador');
    }
    return;
  }

  if (channel.type === 'CLEARKEY' && channel.keyId && channel.key) {
    const keyId = channel.keyId.replace(/-/g, '');
    const key = channel.key.replace(/-/g, '');
    player.configure({
      drm: {
        clearKeys: {
          [keyId]: key
        }
      }
    });
  }

  if (channel.type === 'WIDEVINE' && channel.drmLicenseUri) {
    player.configure({
      drm: {
        servers: {
          'com.widevine.alpha': channel.drmLicenseUri
        }
      }
    });
  }

  loadTimeout = setTimeout(function() {
    console.error('player.load TIMEOUT after 15s');
    showLoading(false);
    showError('Timeout: el MPD no se pudo cargar en 15s');
    try {
      if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(JSON.stringify({ action: 'timeout', url: channel.url }));
      }
    } catch(e) {}
  }, 15000);

  console.log('player.load called, url: ' + (channel.url || channel.manifestUrl));
  player.load(channel.url || channel.manifestUrl).then(function() {
    console.log('player.load resolved');
    if (loadTimeout) clearTimeout(loadTimeout);
    showLoading(false);
    document.getElementById('btn-play').innerHTML = '&#10074;&#10074;';
    if (video.muted) {
      video.muted = false;
      document.getElementById('btn-mute').innerHTML = '&#128266;';
    }
    applyDefaults();
    try {
      if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(JSON.stringify({ action: 'loaded', name: channel.name }));
      }
    } catch(e) {}
    if (diagInterval) clearInterval(diagInterval);
    diagInterval = setInterval(function() {
      var stats = player ? player.getStats() : null;
      var buf = video.buffered;
      var bufLen = buf.length;
      var bufEnd = bufLen > 0 ? buf.end(bufLen - 1) : 0;
      console.log('DIAG: readyState=' + video.readyState + ', paused=' + video.paused + ', currentTime=' + video.currentTime.toFixed(1) + ', bufEnd=' + bufEnd.toFixed(1) + ', bufLen=' + bufLen + ', dropped=' + (stats ? stats.droppedFrames : '?') + ', stalled=' + (stats ? stats.stallDetected : '?'));
    }, 3000);
  }).catch(function(err) {
    if (diagInterval) { clearInterval(diagInterval); diagInterval = null; }
    console.error('player.load error:', err);
    if (loadTimeout) clearTimeout(loadTimeout);
    showLoading(false);
    var loadMsg = err.code === 6007
      ? 'Servidor de licencias no accesible. El canal no puede reproducirse.'
      : 'Error al cargar: ' + (err.message || err);
    showError(loadMsg);
    try {
      if (window.chrome && window.chrome.webview) {
        window.chrome.webview.postMessage(JSON.stringify({ action: 'loadError', message: err.message, code: err.code }));
      }
    } catch(e) {}
  });
}

function togglePlay() {
  const video = document.getElementById('video-player');
  const willPlay = video.paused;
  if (willPlay) {
    video.play();
    document.getElementById('btn-play').innerHTML = '&#10074;&#10074;';
  } else {
    video.pause();
    document.getElementById('btn-play').innerHTML = '&#9654;';
  }
  try {
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.postMessage(JSON.stringify({ action: 'playState', playing: willPlay }));
    }
  } catch(e) {}
}

function toggleMute() {
  const video = document.getElementById('video-player');
  video.muted = !video.muted;
  document.getElementById('btn-mute').innerHTML = video.muted ? '&#128263;' : '&#128266;';
}

function toggleControls() {
  controlsVisible = !controlsVisible;
  document.getElementById('controls').classList.toggle('visible', controlsVisible);
  if (controlsVisible) {
    clearTimeout(controlsTimer);
    controlsTimer = setTimeout(() => {
      controlsVisible = false;
      document.getElementById('controls').classList.remove('visible');
    }, 5000);
  }
}

function showControls() {
  document.getElementById('controls').classList.add('show');
  clearTimeout(controlsTimer);
  controlsTimer = setTimeout(() => {
    if (!controlsVisible) document.getElementById('controls').classList.remove('show');
  }, 3000);
}

function hideControls() {
  if (!controlsVisible) document.getElementById('controls').classList.remove('show');
}

function toggleFullscreen() {
  var el = document.getElementById('video-player');
  if (!document.fullscreenElement && !document.webkitFullscreenElement) {
    if (el.requestFullscreen) {
      el.requestFullscreen();
    } else if (el.webkitRequestFullscreen) {
      el.webkitRequestFullscreen();
    }
  } else {
    if (document.exitFullscreen) {
      document.exitFullscreen();
    } else if (document.webkitExitFullscreen) {
      document.webkitExitFullscreen();
    }
  }
}

document.addEventListener('fullscreenchange', function() {
  document.getElementById('btn-fullscreen').innerHTML = document.fullscreenElement ? '&#10530;' : '&#9974;';
});
document.addEventListener('webkitfullscreenchange', function() {
  document.getElementById('btn-fullscreen').innerHTML = document.webkitFullscreenElement ? '&#10530;' : '&#9974;';
});

function showLoading(active) {
  document.getElementById('loading').classList.toggle('active', active);
}

function showError(msg) {
  const el = document.getElementById('error-display');
  el.textContent = typeof msg === 'string' ? msg : (msg.detail?.message || 'Error desconocido');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 8000);
}

function onPlayerError(event) {
  const err = event.detail;
  var dataStr = '';
  if (err.data && err.data.length > 0) {
    dataStr = err.data.map(function(d) { return typeof d === 'string' ? d : JSON.stringify(d); }).join(', ');
  }
  console.error('Shaka error: code=' + err.code + ', cat=' + err.category + ', sev=' + err.severity + ', data=[' + dataStr + ']');
  var msg = 'Error: [' + err.code + '] ' + (err.message || 'desconocido');
  if (err.code === 6007) {
    msg = 'Servidor de licencias no accesible. El canal no puede reproducirse.';
  } else if (err.severity === 2) {
    msg = 'Error recuperable [' + err.code + ']: ' + (err.data ? dataStr : err.message);
  }
  showError(msg);
  try {
    if (window.chrome && window.chrome.webview) {
      window.chrome.webview.postMessage(JSON.stringify({ action: 'error', code: err.code, category: err.category, data: dataStr, message: err.message }));
    }
  } catch(e) {}
}

function onWebViewMessage(event) {
  try {
    const data = event.data;
    if (data.action === 'loadChannel') {
      loadChannel(data.channel);
    }
  } catch(e) {
    console.error('Error processing message:', e);
  }
}

if (window.chrome && window.chrome.webview) {
  window.chrome.webview.addEventListener('message', onWebViewMessage);
} else {
  window.addEventListener('message', onWebViewMessage);
}

document.addEventListener('DOMContentLoaded', init);

// Settings overlay
let settingsVisible = false;
let pickerCategory = null;
let selectedTracks = { quality: -1, audio: -1, subtitle: -1 };

function toggleSettings() {
  settingsVisible = !settingsVisible;
  document.getElementById('settings-panel').classList.toggle('visible', settingsVisible);
  document.getElementById('btn-settings').classList.toggle('active', settingsVisible);
  if (settingsVisible) {
    clearTimeout(controlsTimer);
    document.getElementById('controls').classList.add('show');
    pickerCategory = null;
    renderPicker(null);
    refreshTrackOptions();
  } else {
    pickerCategory = null;
    renderPicker(null);
    hideControlsDelayed();
  }
}

function onSettingsRowClick(cat) {
  if (pickerCategory === cat) {
    pickerCategory = null;
    renderPicker(null);
  } else {
    pickerCategory = cat;
    refreshTrackOptions();
    renderPicker(cat);
  }
}

function renderPicker(cat) {
  ['quality','audio','subtitle'].forEach(function(c) {
    var el = document.getElementById('sp-picker-' + c);
    if (el) el.classList.toggle('open', c === cat);
  });
}

function refreshTrackOptions() {
  if (!player) return;
  try {
    var variants = player.getVariantTracks().filter(function(t) { return t.type === 'variant'; });
    var seen = {};
    var qualityOpts = [];
    variants.forEach(function(t) {
      var label = t.height ? t.height + 'p' : (t.bandwidth ? Math.round(t.bandwidth / 1000) + 'kbps' : '');
      if (!label || seen[label]) return;
      seen[label] = true;
      var sel = selectedTracks.quality === label ? ' selected' : '';
      qualityOpts.push('<span class="sp-option' + sel + '" data-value="' + label + '" onclick="selectOption(\'quality\',\'' + label + '\')">' + label + '</span>');
    });
    document.getElementById('sp-picker-quality').innerHTML = qualityOpts.join('');
    document.getElementById('sp-quality-value').textContent = selectedTracks.quality === -1 ? 'Auto' : selectedTracks.quality;

    var audioTracks = player.getAudioTracks();
    var audioOpts = audioTracks.map(function(t, i) {
      var label = t.label || t.language || 'Pista ' + (i + 1);
      var sel = selectedTracks.audio === i ? ' selected' : '';
      return '<span class="sp-option' + sel + '" data-index="' + i + '" onclick="selectOption(\'audio\', ' + i + ')">' + label + '</span>';
    });
    document.getElementById('sp-picker-audio').innerHTML = audioOpts.join('');
    var curAudio = (selectedTracks.audio >= 0 && audioTracks[selectedTracks.audio]) ? (audioTracks[selectedTracks.audio].label || audioTracks[selectedTracks.audio].language) : 'Auto';
    document.getElementById('sp-audio-value').textContent = curAudio;

    var textTracks = player.getTextTracks();
    var subOpts = [];
    subOpts.push('<span class="sp-option' + (selectedTracks.subtitle === -1 ? ' selected' : '') + '" onclick="selectOption(\'subtitle\', -1)">Off</span>');
    textTracks.forEach(function(t, i) {
      var label = t.label || t.language || 'Subs ' + (i + 1);
      var sel = selectedTracks.subtitle === i ? ' selected' : '';
      subOpts.push('<span class="sp-option' + sel + '" data-index="' + i + '" onclick="selectOption(\'subtitle\', ' + i + ')">' + label + '</span>');
    });
    document.getElementById('sp-picker-subtitle').innerHTML = subOpts.join('');
    document.getElementById('sp-subtitle-value').textContent = selectedTracks.subtitle === -1 ? 'Off' : ((textTracks[selectedTracks.subtitle] && (textTracks[selectedTracks.subtitle].label || textTracks[selectedTracks.subtitle].language)) || 'Subs');
  } catch(e) {
    console.error('refreshTrackOptions error:', e);
  }
}

function selectOption(cat, value) {
  if (!player) return;
  try {
    if (cat === 'quality') {
      if (value === 'Auto' || value === -1) {
        player.configure({ abr: { enabled: true } });
        selectedTracks.quality = -1;
      } else {
        var variants = player.getVariantTracks().filter(function(t) { return t.type === 'variant'; });
        var track = null;
        for (var i = 0; i < variants.length; i++) {
          var label = variants[i].height ? variants[i].height + 'p' : '';
          if (label === value) { track = variants[i]; break; }
        }
        if (track) {
          player.configure({ abr: { enabled: false } });
          player.selectVariantTrack(track, true);
          selectedTracks.quality = value;
        }
      }
    } else if (cat === 'audio') {
      var at = player.getAudioTracks();
      if (value >= 0 && at[value]) {
        player.selectAudioTrack(at[value], true);
        selectedTracks.audio = value;
      }
    } else if (cat === 'subtitle') {
      var st = player.getTextTracks();
      if (value === -1) {
        player.setTextTrackVisibility(false);
        selectedTracks.subtitle = -1;
      } else if (st[value]) {
        player.selectTextTrack(st[value]);
        player.setTextTrackVisibility(true);
        selectedTracks.subtitle = value;
      }
    }
    refreshTrackOptions();
  } catch(e) {
    console.error('selectOption error:', e);
  }
}

function applyDefaults() {
  if (!player) return;
  try {
    var audioTracks = player.getAudioTracks();
    var spaIdx = -1;
    for (var i = 0; i < audioTracks.length; i++) {
      var label = (audioTracks[i].label || '').toLowerCase();
      var lang = (audioTracks[i].language || '').toLowerCase();
      if (label.indexOf('spa') >= 0 || label.indexOf('spanish') >= 0 || label.indexOf('español') >= 0 || label.indexOf('espanol') >= 0 || lang === 'es' || lang === 'spa') {
        spaIdx = i; break;
      }
    }
    if (spaIdx >= 0) {
      player.selectAudioTrack(audioTracks[spaIdx]);
      selectedTracks.audio = spaIdx;
    }
    player.setTextTrackVisibility(false);
    selectedTracks.subtitle = -1;
    selectedTracks.quality = -1;
    refreshTrackOptions();
  } catch(e) {
    console.error('applyDefaults error:', e);
  }
}

function hideControlsDelayed() {
  clearTimeout(controlsTimer);
  controlsTimer = setTimeout(function() {
    if (!settingsVisible) {
      document.getElementById('controls').classList.remove('show');
    }
  }, 3000);
}

// Close settings when clicking outside
document.addEventListener('click', function(e) {
  if (!settingsVisible) return;
  var panel = document.getElementById('settings-panel');
  var btn = document.getElementById('btn-settings');
  if (!panel.contains(e.target) && !btn.contains(e.target)) {
    settingsVisible = false;
    panel.classList.remove('visible');
    btn.classList.remove('active');
    pickerCategory = null;
    renderPicker(null);
    hideControlsDelayed();
  }
});
</script>
</body>
</html>
